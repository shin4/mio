<svg xmlns="http://www.w3.org/2000/svg" width="360" height="280" viewBox="0 0 360 280" role="img" aria-label="Login form UI mock">
  <defs>
    <style>
      .ui { font-family: -apple-system, "Segoe UI", "Inter", Roboto, system-ui, sans-serif; }
      .label { fill: #475569; }
      .ph { fill: #94a3b8; }
      .ink { fill: #0f172a; }
    </style>
    <filter id="formShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- page background -->
  <rect width="360" height="280" fill="#f1f5f9"/>

  <!-- card -->
  <rect x="60" y="20" width="240" height="240" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#formShadow)"/>

  <!-- heading -->
  <text x="84" y="58" class="ui ink" font-size="18" font-weight="700">Sign in</text>

  <!-- email field -->
  <text x="84" y="86" class="ui label" font-size="11" font-weight="600">Email</text>
  <rect x="84" y="94" width="192" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="96" y="115" class="ui ph" font-size="12">you@example.com</text>

  <!-- password field -->
  <text x="84" y="150" class="ui label" font-size="11" font-weight="600">Password</text>
  <rect x="84" y="158" width="192" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <g fill="#94a3b8">
    <circle cx="98" cy="175" r="2.5"/>
    <circle cx="108" cy="175" r="2.5"/>
    <circle cx="118" cy="175" r="2.5"/>
    <circle cx="128" cy="175" r="2.5"/>
    <circle cx="138" cy="175" r="2.5"/>
    <circle cx="148" cy="175" r="2.5"/>
  </g>

  <!-- primary button -->
  <rect x="84" y="206" width="192" height="34" rx="8" fill="#ff6900"/>
  <text x="180" y="228" class="ui" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Sign in</text>

  <!-- subtle link -->
  <text x="180" y="254" class="ui ph" font-size="11" text-anchor="middle">Forgot your password?</text>
</svg>
