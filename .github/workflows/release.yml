name: release

# Cut a release by pushing a tag like `v1.2.0`, or run manually from the Actions
# tab (workflow_dispatch) supplying the version. Produces signed/notarized macOS
# (arm64) and Windows (x64) installers and publishes them to a GitHub Release
# together with the electron-updater metadata (latest.yml / latest-mac.yml).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            value="${{ inputs.version }}"
          else
            value="${GITHUB_REF_NAME#v}"
          fi
          value="${value#v}"
          echo "value=${value}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${value}"

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.value }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft \
              --title "$tag" --notes "Release $tag" --target "${{ github.sha }}"
          fi

  macos:
    needs: prepare
    runs-on: macos-14 # Apple Silicon — native arm64 build
    env:
      MIMO_CHANNEL: prod
      MIMO_VERSION: ${{ needs.prepare.outputs.version }}
      MIMO_TARGET_PLATFORM: darwin
      MIMO_TARGET_ARCH: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        working-directory: packages/desktop
        run: bun scripts/set-version.ts "${{ needs.prepare.outputs.version }}"

      - name: Build & package (signed + notarized if secrets present)
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ github.token }}
          # Code signing — set CSC_LINK (base64 of the Developer ID Application
          # .p12) and CSC_KEY_PASSWORD to sign; otherwise auto-discovery is off
          # and an unsigned app is produced.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # Notarization — requires all three. APPLE_TEAM_ID also flips the
          # config's `notarize` on (see electron-builder.config.ts).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bun run build
          bunx electron-builder --mac --arm64 --config electron-builder.config.ts --publish always

  windows:
    needs: prepare
    runs-on: windows-latest # native x64 build
    env:
      MIMO_CHANNEL: prod
      MIMO_VERSION: ${{ needs.prepare.outputs.version }}
      MIMO_TARGET_PLATFORM: win32
      MIMO_TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        working-directory: packages/desktop
        run: bun scripts/set-version.ts "${{ needs.prepare.outputs.version }}"

      - name: Build & package (signed if Azure Trusted Signing secrets present)
        working-directory: packages/desktop
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          # Windows signing is optional: sign-windows.ps1 skips when these are
          # unset, producing an unsigned installer. Add the three secrets later
          # to enable Azure Trusted Signing without changing this workflow.
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          bun run build
          bunx electron-builder --win --x64 --config electron-builder.config.ts --publish always

  publish:
    needs: [prepare, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ needs.prepare.outputs.version }}" --repo "$GITHUB_REPOSITORY" --draft=false
