name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        run: gitleaks detect --redact -c .gitleaks.toml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Typecheck agent
        working-directory: packages/agent
        run: bun typecheck

      - name: Typecheck app
        working-directory: packages/app
        run: bun typecheck

      - name: Typecheck core
        working-directory: packages/core
        run: bun typecheck

      - name: Typecheck desktop
        working-directory: packages/desktop
        run: bun typecheck

      - name: Typecheck llm
        working-directory: packages/llm
        run: bun typecheck

      - name: Typecheck JavaScript SDK
        working-directory: packages/sdk/js
        run: bun typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  # Blocking gate for every package except the agent (see test-agent below).
  test:
    runs-on: ubuntu-latest
    # Dummy key so llm's replay-mode recorded tests can resolve auth credentials.
    # HTTP is served from cassettes, so the value is never used for a real call.
    env:
      ANTHROPIC_API_KEY: fixture
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Run unit tests (excluding agent)
        run: bun turbo test:ci --filter='!mio-agent'

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: packages/**/.artifacts/unit/junit.xml
          if-no-files-found: ignore

  # The agent suite has ~98 pre-existing failures on main (core session/loop
  # tests tied to the in-progress v2 migration, plus stale CLI smoke tests).
  # Run it for visibility but DO NOT block PRs until it is green. Once the
  # failures are fixed, fold this back into the `test` job (drop the filter)
  # or make test-agent a required check.
  test-agent:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Run agent unit tests (non-blocking)
        run: bun turbo test:ci --filter='mio-agent'

      - name: Upload agent test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-agent
          path: packages/agent/.artifacts/unit/junit.xml
          if-no-files-found: ignore
