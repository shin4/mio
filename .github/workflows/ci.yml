name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        run: gitleaks detect --redact -c .gitleaks.toml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Typecheck agent
        working-directory: packages/agent
        run: bun typecheck

      - name: Typecheck app
        working-directory: packages/app
        run: bun typecheck

      - name: Typecheck core
        working-directory: packages/core
        run: bun typecheck

      - name: Typecheck desktop
        working-directory: packages/desktop
        run: bun typecheck

      - name: Typecheck llm
        working-directory: packages/llm
        run: bun typecheck

      - name: Typecheck JavaScript SDK
        working-directory: packages/sdk/js
        run: bun typecheck
