name: build-check

# Unsigned compile + package smoke test for the desktop app. Runs on PRs and
# pushes to main so packaging breaks are caught before a release tag is cut.
# No secrets are used — macOS builds unsigned (notarization off, code signing
# auto-discovery off) and Windows builds unsigned.
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "site/**"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "site/**"

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-14
    env:
      MIMO_CHANNEL: prod
      MIMO_VERSION: 0.0.0-ci
      MIMO_TARGET_PLATFORM: darwin
      MIMO_TARGET_ARCH: arm64
      CSC_IDENTITY_AUTO_DISCOVERY: false # skip code signing
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package (unsigned)
        working-directory: packages/desktop
        run: |
          bun run build
          bunx electron-builder --mac --arm64 --config electron-builder.config.ts --publish never

  windows:
    runs-on: windows-latest
    env:
      MIMO_CHANNEL: prod
      MIMO_VERSION: 0.0.0-ci
      MIMO_TARGET_PLATFORM: win32
      MIMO_TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package (unsigned)
        working-directory: packages/desktop
        shell: bash
        run: |
          bun run build
          bunx electron-builder --win --x64 --config electron-builder.config.ts --publish never
